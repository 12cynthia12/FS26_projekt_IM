<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sunneuf- und untergang</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- leaflet style -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <!-- leaflet karte -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- berechnung: tag/nacht-grenze -->
    <script src="https://unpkg.com/@joergdietrich/leaflet.terminator@1.0.0/L.Terminator.js"></script>
    <!-- lottie-player -->
     <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body>
    <main>
        <!-- karte -->
        <div id="map"></div>
        <header>
            <div class="header_text">
                <h1>sunneuf- und untergang</h1>
                <h2>rund um d welt</h2>
            </div>
            <img class="sunicon" src="figma/sonne.svg" alt="Sonnen-Icon">
        </header>
        <div id="info-card" class="hidden-card">
            <div class="card-animation">
                <lottie-player id="lottie" src="animation/animation_sun.json" autoplay loop></lottie-player>
                <div class="card-times">
                    <div class="time-sunrise">
                        <img class="time-icon" src="figma/rise.svg">
                        <p id="sunrise"></p>
                    </div>
                    <div class="time-sunset">
                        <img class="time-icon" src="figma/set.svg">
                        <p id="sunset"></p>
                    </div>
                </div>
            </div>
            <p id="city-name"></p>
        </div>
    </main>
    <footer>
    </footer>
    <script src="js/script.js" type="module"></script>
</body>
</html>
